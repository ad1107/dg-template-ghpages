name: Build and Deploy to GitHub Pages

# This workflow builds the Eleventy-based Digital Garden and deploys it to GitHub Pages
# It runs on every push to main branch and can be triggered manually

on:
  push:
    branches: [ main ]
  # Remove pull_request trigger to avoid unnecessary builds on PRs
  workflow_dispatch: # Allow manual trigger from GitHub UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Set Node.js environment for optimal performance
  NODE_ENV: production

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Updated to Node.js 20 (latest LTS)
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Setup Pages
        uses: actions/configure-pages@v5 # Updated to latest version
        
      - name: Cache Eleventy .cache directory
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-eleventy-cache-${{ hashFiles('**/*.md', '**/*.njk', '**/*.js') }}
          restore-keys: |
            ${{ runner.os }}-eleventy-cache-
            
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci
          echo "✅ Dependencies installed successfully"
        
      - name: Build site
        run: npm run build
        env:
          ELEVENTY_ENV: prod      - name: Verify build output
        run: |
          echo "🔍 Build directory contents:"
          ls -la ./dist/
          echo ""
          echo "📊 Build statistics:"
          echo "Total files: $(find ./dist -type f | wc -l)"
          echo "HTML files: $(find ./dist -name "*.html" | wc -l)"
          echo "CSS files: $(find ./dist -name "*.css" | wc -l)"
          echo "JS files: $(find ./dist -name "*.js" | wc -l)"
          echo "Image files: $(find ./dist -name "*.svg" -o -name "*.png" -o -name "*.jpg" -o -name "*.webp" | wc -l)"
          echo ""
          echo "✅ Checking critical files:"
          test -f ./dist/index.html && echo "✓ index.html found" || (echo "✗ index.html missing" && exit 1)
          test -f ./dist/searchIndex.json && echo "✓ searchIndex.json found" || echo "⚠️  searchIndex.json missing"
          test -f ./dist/graph.json && echo "✓ graph.json found" || echo "⚠️  graph.json missing"
          echo ""
          echo "🎯 Build completed successfully!"
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # Updated to latest non-deprecated version
        with:
          path: ./dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Updated to latest version
